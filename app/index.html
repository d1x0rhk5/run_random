<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>욕망의 달리기 뽑기</title>
  <meta name="description" content="입력한 숫자 범위와 human.txt 명단이 동시에 달리는 2중 추첨 페이지.">
  <meta name="theme-color" content="#081a13">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
  <link rel="stylesheet" href="../assets/style.scss">
</head>
<body>
  <div class="app-shell">
    <div class="control-bar" aria-label="추첨 설정">
      <div class="range-control" role="group" aria-labelledby="range-label">
        <span id="range-label" class="control-label">숫자 범위</span>
        <label class="number-field">
          <span>시작</span>
          <input id="numberMin" type="number" inputmode="numeric" step="1" value="0" aria-label="시작 숫자">
        </label>
        <span class="range-separator">~</span>
        <label class="number-field">
          <span>끝</span>
          <input id="numberMax" type="number" inputmode="numeric" step="1" value="50" aria-label="끝 숫자">
        </label>
        <span id="rangeStatus" class="range-status" aria-live="polite">51개</span>
      </div>

      <button id="btnStart" class="primary-action" type="button">봉인 해제</button>

      <div class="speed-control" role="group" aria-label="배속 선택">
        <span class="control-label">배속</span>
        <button class="speed-button is-active" type="button" data-speed="1" aria-pressed="true">1배속</button>
        <button class="speed-button" type="button" data-speed="2" aria-pressed="false">2배속</button>
        <button class="speed-button" type="button" data-speed="4" aria-pressed="false">4배속</button>
      </div>
    </div>

    <main class="arena-grid">
      <section class="game-panel" id="numbers-panel" data-state="idle">
        <div class="stage-shell"></div>
      </section>

      <section class="game-panel" id="humans-panel" data-state="idle">
        <div class="stage-shell"></div>
      </section>
    </main>

  </div>

  <div id="countdown" class="countdown" hidden>3</div>
  <section id="winner-board" class="winner-board" hidden>
    <article class="winner-card">
      <span class="winner-label">숫자</span>
      <strong id="winner-number" class="winner-value">-</strong>
    </article>
    <article class="winner-card">
      <span class="winner-label">당첨자</span>
      <strong id="winner-human" class="winner-value">-</strong>
    </article>
  </section>

  <script type="module" src="../src/index.ts"></script>
</body>
</html>
